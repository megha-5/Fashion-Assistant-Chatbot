<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maeve - Where Confidence Meets Couture</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,600;1,500&display=swap" rel="stylesheet">

  <style>
    .brand-font { font-family: 'Great Vibes', cursive; }
    .tagline-font { font-family: 'Playfair Display', serif; }
    .chat-icon { transition: all 0.3s ease; cursor: pointer; }
    .chat-icon:hover { transform: scale(1.1); filter: drop-shadow(0 4px 8px rgba(236,72,153,0.3)); }
    #chatbot-container {
      display: none;
      position: fixed;
      bottom: 80px;
      right: 20px;
      width: 400px;
      height: 600px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      overflow: hidden;
      z-index: 9999;
    }
    #close-chat { position: absolute; top: 5px; right: 10px; cursor: pointer; font-size: 20px; color: #ec4899; }
  </style>
</head>
<body>
  <div class="relative min-h-screen flex flex-col items-center justify-center bg-cover bg-center text-center"
       style="background-image: url('360_F_296198884_iJvPPEL8ACqJETMHn6bs4cNmHv54MGMv.jpg');">

    <h1 class="brand-font text-7xl md:text-8xl font-bold text-black mb-2">Maeve</h1>
    <p class="tagline-font text-lg md:text-xl italic text-pink-500 mb-6">Where confidence meets couture.</p>

    <div class="chat-icon inline-block" onclick="toggleChat()">
      <img src="original-839a9a2a679b62ec44f80405f24cca70.webp" alt="Chat with Maeve" class="w-20 h-20 mx-auto rounded-full">
    </div>
  </div>

  <div id="chatbot-container">
    <span id="close-chat">&times;</span>
    <iframe 
      id="botpress-iframe"
      src="https://cdn.botpress.cloud/webchat/v3.3/shareable.html?configUrl=https://files.bpcontent.cloud/2025/03/12/19/20250312191114-JFXB0A17.json"
      width="100%" 
      height="100%" 
      style="border:none;">
    </iframe>
  </div>

  <script>
    const chatbot = document.getElementById("chatbot-container");
    const closeBtn = document.getElementById("close-chat");

    function toggleChat() {
      chatbot.style.display = chatbot.style.display === "none" ? "block" : "none";
    }

    closeBtn.addEventListener("click", () => {
      window.location.href = "thankyou.html";
    });

    // Spring Boot integration
    window.addEventListener("load", () => {
      const iframe = document.getElementById("botpress-iframe");
      iframe.addEventListener("load", () => {
        const bpWindow = iframe.contentWindow;

        bpWindow.botpressWebChat.onEvent(function(event) {
          if(event.type === "message" && event.payload.type === "text") {
            const userMessage = event.payload.text;

            // Send message to backend
            fetch("http://localhost:8080/api/chat/send", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ content: userMessage })
            });

            // Get backend reply
            fetch("http://localhost:8080/api/chat/reply", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ content: userMessage })
            })
            .then(res => res.json())
            .then(reply => {
              bpWindow.botpressWebChat.sendEvent({
                type: "message",
                channel: "web",
                payload: { type: "text", text: reply.content }
              });
            });
          }
        }, ["message"]);
      });
    });
  </script>
</body>
</html>
